<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A0A0A" />
  <title>GymFit Pro — Sistema de Gestión de Gimnasio</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;color:#111827}button,input,select{font:inherit}.hidden{display:none!important}.app{min-height:100vh}.login{min-height:100vh;display:grid;grid-template-columns:1.15fr .85fr}.hero{background:#0a0a0a;color:white;padding:48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 20% 15%,rgba(250,204,21,.28),transparent 35%),radial-gradient(circle at 90% 80%,rgba(250,204,21,.18),transparent 35%)}.hero>*{position:relative}.brand{display:flex;align-items:center;gap:14px}.logo{width:52px;height:52px;border-radius:16px;background:#facc15;color:#0a0a0a;display:grid;place-items:center;font-weight:900;font-size:24px}.brand h1{font-size:30px;letter-spacing:.03em}.brand p{font-size:12px;color:#a3a3a3;text-transform:uppercase;letter-spacing:.24em}.hero-main{max-width:760px}.pill{display:inline-flex;align-items:center;gap:8px;background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.35);color:#facc15;padding:8px 14px;border-radius:999px;font-weight:800;font-size:13px;margin-bottom:22px}.hero-title{font-size:clamp(44px,7vw,82px);line-height:.95;font-weight:950;letter-spacing:-.04em}.yellow{color:#facc15}.hero-text{margin-top:24px;font-size:18px;line-height:1.7;color:#d4d4d4;max-width:640px}.features{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:32px;max-width:720px}.feature{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:18px}.feature b{display:block;margin-bottom:6px}.feature span{color:#a3a3a3;font-size:13px;line-height:1.5}.login-card{background:white;display:flex;align-items:center;justify-content:center;padding:36px}.panel{width:100%;max-width:460px}.notice{border:1px solid #fde68a;background:#fffbeb;border-radius:20px;padding:16px;color:#713f12;margin-bottom:24px;font-size:14px;line-height:1.5}.panel h2{font-size:34px;margin-bottom:8px}.panel>p{color:#6b7280;margin-bottom:24px}.role-grid{display:grid;gap:12px}.role{width:100%;text-align:left;border:1px solid #e5e7eb;background:#fafafa;border-radius:20px;padding:18px;cursor:pointer;transition:.15s}.role:hover{transform:translateY(-2px);border-color:#facc15;box-shadow:0 14px 30px rgba(0,0,0,.08);background:white}.badge{display:inline-block;font-size:11px;font-weight:900;border-radius:999px;padding:5px 9px;margin-right:8px}.admin{background:#fee2e2;color:#991b1b}.trainer{background:#dbeafe;color:#1d4ed8}.client{background:#dcfce7;color:#166534}.role h3{font-size:17px;margin-bottom:5px}.role p{color:#6b7280;font-size:14px;line-height:1.5}.shell{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:#0a0a0a;color:white;padding:24px;display:flex;flex-direction:column;gap:24px}.side .brand h1{font-size:22px}.nav{display:grid;gap:8px}.nav button{border:0;background:transparent;color:#d4d4d4;text-align:left;padding:12px 14px;border-radius:14px;cursor:pointer;font-weight:700}.nav button.active,.nav button:hover{background:#facc15;color:#111827}.logout{margin-top:auto;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:white;padding:12px;border-radius:14px;cursor:pointer}.main{padding:30px;overflow:auto}.top{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:24px}.top h2{font-size:32px}.top p{color:#6b7280;margin-top:4px}.demo-tag{background:#111827;color:#facc15;border-radius:999px;padding:10px 14px;font-size:13px;font-weight:900}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:24px}.card{background:white;border:1px solid #e5e7eb;border-radius:24px;padding:22px;box-shadow:0 12px 28px rgba(0,0,0,.04)}.card small{display:block;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;font-weight:900;font-size:11px}.card strong{display:block;font-size:32px;margin-top:8px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}.section-title{font-size:20px;margin-bottom:14px}.item{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px;border:1px solid #f3f4f6;border-radius:16px;margin-bottom:10px;background:#fff}.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:#fef3c7;color:#92400e;font-weight:900}.item-left{display:flex;align-items:center;gap:12px}.muted{color:#6b7280;font-size:13px}.table{width:100%;border-collapse:collapse;background:white;border-radius:22px;overflow:hidden;border:1px solid #e5e7eb}.table th,.table td{text-align:left;padding:14px;border-bottom:1px solid #f3f4f6}.table th{font-size:12px;text-transform:uppercase;color:#6b7280;background:#fafafa}.btn{border:0;background:#facc15;color:#111827;padding:10px 14px;border-radius:12px;font-weight:900;cursor:pointer}.progress{height:9px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}.bar{height:100%;background:#facc15;border-radius:999px}.mobile-brand{display:none}@media(max-width:900px){.login{grid-template-columns:1fr}.hero{display:none}.mobile-brand{display:flex;margin-bottom:26px}.shell{grid-template-columns:1fr}.side{position:sticky;top:0;z-index:10}.nav{grid-template-columns:repeat(3,1fr)}.cards{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}@media(max-width:560px){.main{padding:18px}.cards{grid-template-columns:1fr}.nav button{font-size:13px;padding:10px}.top{display:block}.demo-tag{display:inline-block;margin-top:12px}}
  </style>
</head>
<body>
  <div id="app" class="app"></div>
  <script>
    const data={
      gym:'GymFit Pro Demo',
      users:[
        {name:'Carlos Administrador',role:'admin',email:'admin@gym.com',phone:'555-0100'},
        {name:'María Entrenadora',role:'trainer',email:'entrenador@gym.com',phone:'555-0201'},
        {name:'José Pérez',role:'trainer',email:'jose@gym.com',phone:'555-0202'},
        {name:'Ana García',role:'client',email:'cliente@gym.com',trainer:'María Entrenadora',goal:'Tonificar y bajar 5 kg',weight:64.5,progress:78},
        {name:'Luis Ramírez',role:'client',email:'luis@gym.com',trainer:'María Entrenadora',goal:'Ganar masa muscular',weight:77,progress:62},
        {name:'Sofía Vargas',role:'client',email:'sofia@gym.com',trainer:'José Pérez',goal:'Resistencia cardiovascular',weight:58,progress:44},
        {name:'Pedro Torres',role:'client',email:'pedro@gym.com',trainer:'José Pérez',goal:'Rehabilitación rodilla + fuerza',weight:82,progress:51}
      ],
      programs:[
        {name:'Plan Tonificación - Ana',client:'Ana García',trainer:'María Entrenadora',exercises:6,status:'Activo'},
        {name:'Hipertrofia - Luis',client:'Luis Ramírez',trainer:'María Entrenadora',exercises:4,status:'Activo'},
        {name:'Cardio Base - Sofía',client:'Sofía Vargas',trainer:'José Pérez',exercises:5,status:'Borrador'}
      ],
      measurements:[
        {client:'Ana García',date:'2026-05-08',weight:'64.5 kg',waist:'74 cm'},
        {client:'Luis Ramírez',date:'2026-04-24',weight:'77 kg',waist:'84 cm'},
        {client:'Sofía Vargas',date:'2026-04-18',weight:'58 kg',waist:'69 cm'}
      ]
    };
    let role=localStorage.getItem('gymfit.role')||'';
    let view='dashboard';
    const app=document.getElementById('app');
    function badge(r){return `<span class="badge ${r==='admin'?'admin':r==='trainer'?'trainer':'client'}">${r==='admin'?'ADMIN':r==='trainer'?'TRAINER':'CLIENT'}</span>`}
    function roleName(r){return r==='admin'?'Administrador':r==='trainer'?'Entrenador':'Cliente'}
    function login(){app.innerHTML=`<div class="login"><section class="hero"><div class="brand"><div class="logo">G</div><div><h1>${data.gym}</h1><p>Sistema comercial para gimnasios</p></div></div><div class="hero-main"><div class="pill">✓ Demo funcional restaurada</div><h1 class="hero-title">GESTIONA <span class="yellow">CLIENTES</span><br>RUTINAS Y PROGRESO</h1><p class="hero-text">Sistema para administrar clientes, entrenadores, rutinas personalizadas y seguimiento de medidas corporales desde una sola app.</p><div class="features"><div class="feature"><b>Clientes</b><span>Historial, objetivos y entrenador asignado.</span></div><div class="feature"><b>Progreso</b><span>Mediciones corporales y avance.</span></div><div class="feature"><b>Roles</b><span>Admin, entrenador y cliente.</span></div></div></div><div style="color:#a3a3a3;font-size:14px">© 2026 ${data.gym}</div></section><section class="login-card"><div class="panel"><div class="mobile-brand brand"><div class="logo">G</div><div><h1>${data.gym}</h1><p>Demo</p></div></div><div class="notice"><b>Modo demo</b><br>Elige un rol para entrar. No necesitas credenciales para esta demo pública.</div><h2>Entrar a GymFit Pro</h2><p>Prueba cómo se ve la app para cada usuario.</p><div class="role-grid"><button class="role" onclick="enter('admin')">${badge('admin')}<h3>Dueño / administrador</h3><p>Panel general, usuarios, entrenadores, clientes y reportes.</p></button><button class="role" onclick="enter('trainer')">${badge('trainer')}<h3>Entrenador</h3><p>Clientes asignados, rutinas, mediciones y seguimiento.</p></button><button class="role" onclick="enter('client')">${badge('client')}<h3>Cliente</h3><p>Rutina, progreso, objetivo y entrenador asignado.</p></button></div></div></section></div>`}
    window.enter=function(r){role=r;view='dashboard';localStorage.setItem('gymfit.role',r);renderApp()}
    window.logout=function(){localStorage.removeItem('gymfit.role');role='';login()}
    window.go=function(v){view=v;renderApp()}
    function nav(){const items=role==='admin'?[['dashboard','Dashboard'],['users','Usuarios'],['programs','Rutinas'],['measurements','Mediciones'],['settings','Ajustes']]:role==='trainer'?[['dashboard','Dashboard'],['clients','Mis clientes'],['programs','Rutinas'],['measurements','Mediciones']]:[['dashboard','Inicio'],['programs','Mi rutina'],['measurements','Mi progreso']];return `<div class="nav">${items.map(i=>`<button class="${view===i[0]?'active':''}" onclick="go('${i[0]}')">${i[1]}</button>`).join('')}</div>`}
    function shell(content){app.innerHTML=`<div class="shell"><aside class="side"><div class="brand"><div class="logo">G</div><div><h1>${data.gym}</h1><p>${roleName(role)}</p></div></div>${nav()}<button class="logout" onclick="logout()">Salir de la demo</button></aside><main class="main">${content}</main></div>`}
    function header(title,sub){return `<div class="top"><div><h2>${title}</h2><p>${sub}</p></div><div class="demo-tag">${badge(role)} Demo activa</div></div>`}
    function dashboard(){const clients=data.users.filter(u=>u.role==='client');const trainers=data.users.filter(u=>u.role==='trainer');let title=role==='admin'?'Panel de Administración':role==='trainer'?'Panel de Entrenador':'Mi Panel';let sub=role==='admin'?'Vista general del gimnasio':role==='trainer'?'Clientes y rutinas asignadas':'Tu progreso y rutina actual';let cards=role==='client'?[['Mi peso','64.5 kg'],['Mi rutina','6 ejercicios'],['Progreso','78%'],['Entrenador','María']]:[['Clientes',clients.length],['Entrenadores',trainers.length],['Rutinas',data.programs.length],['Mediciones',data.measurements.length]];shell(`${header(title,sub)}<div class="cards">${cards.map(c=>`<div class="card"><small>${c[0]}</small><strong>${c[1]}</strong></div>`).join('')}</div><div class="grid2"><section class="card"><h3 class="section-title">Clientes recientes</h3>${clients.slice(0,4).map(c=>`<div class="item"><div class="item-left"><div class="avatar">${c.name[0]}</div><div><b>${c.name}</b><div class="muted">${c.goal}</div></div></div><span class="muted">${c.progress}%</span></div>`).join('')}</section><section class="card"><h3 class="section-title">Valor comercial</h3><div class="item"><div><b>Control de clientes</b><div class="muted">Menos Excel, cuadernos y WhatsApp.</div></div></div><div class="item"><div><b>Seguimiento profesional</b><div class="muted">Mediciones y rutinas por persona.</div></div></div><div class="item"><div><b>Escalable</b><div class="muted">Luego se conecta a base de datos real.</div></div></div></section></div>`)}
    function users(){shell(`${header('Usuarios','Administra cuentas por rol')}<table class="table"><thead><tr><th>Nombre</th><th>Correo</th><th>Rol</th><th>Teléfono</th></tr></thead><tbody>${data.users.map(u=>`<tr><td>${u.name}</td><td>${u.email}</td><td>${badge(u.role)}</td><td>${u.phone||'-'}</td></tr>`).join('')}</tbody></table>`)}
    function clients(){const clients=data.users.filter(u=>u.role==='client');shell(`${header('Mis clientes','Clientes asignados al entrenador')}<div class="grid2">${clients.map(c=>`<div class="card"><h3>${c.name}</h3><p class="muted">${c.goal}</p><p style="margin-top:12px"><b>Entrenador:</b> ${c.trainer}</p><p><b>Peso:</b> ${c.weight} kg</p><div class="progress"><div class="bar" style="width:${c.progress}%"></div></div></div>`).join('')}</div>`)}
    function programs(){shell(`${header(role==='client'?'Mi rutina':'Rutinas','Programas de entrenamiento')}<table class="table"><thead><tr><th>Programa</th><th>Cliente</th><th>Entrenador</th><th>Ejercicios</th><th>Estado</th></tr></thead><tbody>${data.programs.map(p=>`<tr><td>${p.name}</td><td>${p.client}</td><td>${p.trainer}</td><td>${p.exercises}</td><td><button class="btn">${p.status}</button></td></tr>`).join('')}</tbody></table>`)}
    function measurements(){shell(`${header(role==='client'?'Mi progreso':'Mediciones','Historial de avance corporal')}<table class="table"><thead><tr><th>Cliente</th><th>Fecha</th><th>Peso</th><th>Cintura</th></tr></thead><tbody>${data.measurements.map(m=>`<tr><td>${m.client}</td><td>${m.date}</td><td>${m.weight}</td><td>${m.waist}</td></tr>`).join('')}</tbody></table>`)}
    function settings(){shell(`${header('Ajustes','Personalización del gimnasio')}<div class="card"><h3>Branding del gimnasio</h3><p class="muted" style="margin:10px 0 18px">En la versión real aquí se editaría nombre, logo, color y mensaje de bienvenida.</p><input style="width:100%;padding:13px;border:1px solid #e5e7eb;border-radius:14px;margin-bottom:10px" value="${data.gym}"><button class="btn">Guardar cambios</button></div>`)}
    function renderApp(){if(!role)return login();if(view==='dashboard')return dashboard();if(view==='users')return users();if(view==='clients')return clients();if(view==='programs')return programs();if(view==='measurements')return measurements();if(view==='settings')return settings();dashboard()}
    renderApp();
  </script>
</body>
</html>
